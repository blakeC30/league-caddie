server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ──────────────────────────────────────────────────────────
    # Gzip text-based assets. Vite also emits pre-compressed .gz files which
    # nginx serves automatically when gzip_static is on (nginx >= 1.6).
    gzip on;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ── Static asset caching ─────────────────────────────────────────────────
    # Vite hashes filenames on every build (e.g. main.a3f9c2b1.js), so it is
    # safe to cache these files for a very long time. The browser will fetch
    # a new file automatically when the hash changes after a new deployment.
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── React Router ─────────────────────────────────────────────────────────
    # For any path that is not a real file, serve index.html so React Router
    # can handle client-side navigation (e.g. /leagues/123/pick → index.html).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Health probe ─────────────────────────────────────────────────────────
    # Lightweight endpoint for Kubernetes liveness/readiness probes and the
    # Docker HEALTHCHECK. Returns 200 without hitting the filesystem.
    location /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
