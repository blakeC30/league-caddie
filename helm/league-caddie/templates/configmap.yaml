---
# ConfigMap — non-secret environment variables shared by api, scraper, and worker.
#
# These values are safe to inspect with `kubectl describe configmap` and are
# visible in pod specs. Put anything sensitive (passwords, keys) in secret.yaml.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "league-caddie.configmapName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "league-caddie.labels" . | nindent 4 }}
data:
  # Application environment — controls JWT cookie Secure flag and prod-only guards.
  ENVIRONMENT: {{ .Values.config.environment | quote }}

  # Enables /docs and /redoc endpoints on the API when "true".
  DEBUG: {{ .Values.config.debug | quote }}

  # CORS allowed origin — must match the exact URL users visit in their browser.
  FRONTEND_URL: {{ .Values.config.frontendUrl | quote }}

  # AWS region for SES and SQS.
  AWS_REGION: {{ .Values.config.awsRegion | quote }}

  # Override the AWS SDK endpoint URL.
  # Empty = real AWS. Set to http://localstack:4566 for local docker-compose dev only.
  AWS_ENDPOINT_URL: {{ .Values.config.awsEndpointUrl | quote }}

  # Verified SES sender address. Must be verified in AWS SES console before going live.
  SES_FROM_EMAIL: {{ .Values.config.sesFromEmail | quote }}

  # "true" → only platform admins can create leagues. Flip to "false" to open to public.
  LEAGUE_CREATION_RESTRICTED: {{ .Values.config.leagueCreationRestricted | quote }}

  # SQS queue URL for the scraper → worker event pipeline.
  # Phase 7 CI/CD injects the real queue URL per environment.
  SQS_QUEUE_URL: {{ .Values.config.sqsQueueUrl | quote }}
