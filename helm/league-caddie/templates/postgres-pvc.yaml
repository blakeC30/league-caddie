---
# PersistentVolumeClaim — requests durable block storage (EBS on AWS) for PostgreSQL.
#
# On K3s running on EC2, the default StorageClass is "local-path" which provisions
# local node storage. For production durability you should install the AWS EBS CSI driver
# and set storageClassName: ebs-sc. For now, local-path is used (data lives on EC2 disk).
#
# IMPORTANT: Do not delete this PVC. Deleting it destroys all database data.
# Helm will NOT delete PVCs on `helm uninstall` by default — this is intentional.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "league-caddie.fullname" . }}-postgres-data
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "league-caddie.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
  annotations:
    # Prevent accidental deletion via helm uninstall.
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - ReadWriteOnce   # Single-node access — appropriate for a single postgres instance.
  resources:
    requests:
      storage: {{ .Values.postgres.storage }}
