---
# Secret — sensitive environment variables for api, scraper, and worker.
#
# K8s stores Secrets base64-encoded at rest (and encrypted if etcd encryption is enabled).
# Access is restricted via RBAC — pods can only read Secrets in their own namespace.
#
# IMPORTANT: The values in values.yaml are placeholders. Always override at deploy time:
#   helm upgrade ... --set secrets.secretKey="$(openssl rand -hex 32)"
# Never commit real credentials to Git.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "league-caddie.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "league-caddie.labels" . | nindent 4 }}
type: Opaque
stringData:
  # JWT signing key — must be long and random. All issued tokens are invalidated if changed.
  SECRET_KEY: {{ .Values.secrets.secretKey | quote }}

  # PostgreSQL password — must match postgres.POSTGRES_PASSWORD in the postgres Deployment.
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}

  # Google OAuth 2.0 client ID. Leave empty to disable Google login.
  GOOGLE_CLIENT_ID: {{ .Values.secrets.googleClientId | quote }}

  # AWS credentials for SES / SQS.
  # Leave empty in production — the EC2 IAM instance role provides credentials automatically.
  AWS_ACCESS_KEY_ID: {{ .Values.secrets.awsAccessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.secrets.awsSecretAccessKey | quote }}
