# =============================================================================
# values-dev.yaml — Dev namespace overrides
#
# Deploy with:
#   helm upgrade --install league-caddie helm/league-caddie \
#     --namespace dev --create-namespace \
#     -f helm/league-caddie/values-dev.yaml \
#     --set secrets.secretKey="..." \
#     --set secrets.postgresPassword="..."
# =============================================================================

config:
  environment: development
  debug: "true"
  frontendUrl: "http://localhost:8080"
  leagueCreationRestricted: "true"
  sqsQueueUrl: "https://sqs.us-east-1.amazonaws.com/049429105437/league-caddie-events-dev"

postgres:
  database: league_caddie_dev
  storage: 5Gi

ingress:
  host: localhost
  tlsEnabled: false
  # No cert-manager needed — dev is accessed via SSH tunnel, not a public domain
