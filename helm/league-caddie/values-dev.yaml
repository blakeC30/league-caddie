# =============================================================================
# values-dev.yaml — Dev namespace overrides
#
# Deploy with:
#   helm upgrade --install league-caddie helm/league-caddie \
#     --namespace dev --create-namespace \
#     -f helm/league-caddie/values-dev.yaml \
#     --set secrets.secretKey="..." \
#     --set secrets.postgresPassword="..." \
#     --set certManager.email="your@email.com"
# =============================================================================

config:
  environment: development
  debug: "true"
  frontendUrl: "https://dev.league-caddie.com"
  leagueCreationRestricted: "true"
  # Real SQS queue for dev — replace ACCOUNT_ID with your AWS account number.
  sqsQueueUrl: "https://sqs.us-east-1.amazonaws.com/ACCOUNT_ID/league-caddie-events-dev"

postgres:
  database: league_caddie_dev
  storage: 5Gi

ingress:
  host: dev.league-caddie.com
  tlsEnabled: true
  clusterIssuer: letsencrypt-staging   # Use staging first — no rate limits
