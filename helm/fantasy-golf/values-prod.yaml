# =============================================================================
# values-prod.yaml — Production namespace overrides
#
# Deploy with:
#   helm upgrade --install fantasy-golf helm/fantasy-golf \
#     --namespace prod --create-namespace \
#     -f helm/fantasy-golf/values-prod.yaml \
#     --set secrets.secretKey="..." \
#     --set secrets.postgresPassword="..." \
#     --set secrets.googleClientId="..." \
#     --set certManager.email="your@email.com"
# =============================================================================

config:
  environment: production
  debug: "false"
  frontendUrl: "https://league-caddie.com"
  leagueCreationRestricted: "false"
  # Real SQS queue for prod — replace ACCOUNT_ID with your AWS account number.
  sqsQueueUrl: "https://sqs.us-east-1.amazonaws.com/ACCOUNT_ID/fantasy-golf-events"

postgres:
  database: fantasygolf_prod
  storage: 10Gi

ingress:
  host: league-caddie.com
  tlsEnabled: true
  clusterIssuer: letsencrypt-prod
