---
# API Service — ClusterIP so only the ingress and other in-cluster pods can reach it.
# The ingress routes /api/* → this service on port 8000.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "fantasy-golf.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fantasy-golf.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    {{- include "fantasy-golf.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
